name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v0.1.0)
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Mac Sleep Watcher
        run: swiftc priv/mac_sleep_watcher.swift -o mac_sleep_watcher
      - name: Set up Elixir (brew)
        run: brew install erlang elixir
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests and check compilation
        run: |
          mix compile --warnings-as-errors
          mix test
      - name: Package macOS GUI
        run: ./scripts/package_mac_gui.sh
      - name: Create DMG
        run: hdiutil create -volname Eliterm -srcfolder Eliterm_Release -ov -format UDZO Eliterm-macOS.dmg
      - name: Upload Mac Sleep Watcher
        uses: actions/upload-artifact@v4
        with:
          name: mac_sleep_watcher
          path: mac_sleep_watcher
      - name: Upload Mac GUI
        uses: actions/upload-artifact@v4
        with:
          name: Eliterm-macOS.dmg
          path: Eliterm-macOS.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Windows Sleep Watcher
        run: |
          $csc = (Get-ChildItem -Path "C:\Windows\Microsoft.NET\Framework64" -Filter "csc.exe" -Recurse | Sort-Object LastWriteTime -Descending)[0].FullName
          & $csc /out:win_sleep_watcher.exe priv\win_sleep_watcher.cs
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        env:
          ImageOS: win25
        with:
          elixir-version: '1.15.4'
          otp-version: '26.0'
      - name: Install dependencies
        run: mix deps.get
      - name: Package Windows GUI
        run: .\scripts\package_win_gui.ps1
      - name: Zip Windows GUI
        run: Compress-Archive -Path Eliterm-Windows\* -DestinationPath Eliterm-Windows.zip
      - name: Upload Windows Sleep Watcher
        uses: actions/upload-artifact@v4
        with:
          name: win_sleep_watcher.exe
          path: win_sleep_watcher.exe
      - name: Upload Windows GUI
        uses: actions/upload-artifact@v4
        with:
          name: Eliterm-Windows.zip
          path: Eliterm-Windows.zip

  build-elixir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.4'
          otp-version: '26.0'
      - name: Install dependencies
        run: mix deps.get
      - name: Build escript
        run: mix escript.build
      - name: Upload Elixir CLI
        uses: actions/upload-artifact@v4
        with:
          name: eliterm-cli
          path: bin/eliterm

  create-release:
    needs: [build-mac, build-win, build-elixir]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        with:
          name: mac_sleep_watcher
      - name: Download Mac GUI
        uses: actions/download-artifact@v4
        with:
          name: Eliterm-macOS.dmg
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: win_sleep_watcher.exe
      - name: Download Windows GUI
        uses: actions/download-artifact@v4
        with:
          name: Eliterm-Windows.zip
      - name: Download Elixir CLI
        uses: actions/download-artifact@v4
        with:
          name: eliterm-cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mac_sleep_watcher
            win_sleep_watcher.exe
            eliterm
            Eliterm-macOS.dmg
            Eliterm-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
